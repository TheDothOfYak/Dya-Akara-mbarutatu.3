<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Dya'Akara — Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%238a6f42'/><circle cx='50' cy='50' r='38' fill='%233a2f1d'/><circle cx='50' cy='50' r='14' fill='%23d4552a'/></svg>">
  <style>
    /* The shared game stylesheet (css/style.css) pins html, body AND #app to
       position:fixed / overflow:hidden so the game itself never scrolls. The
       admin panel lives inside that same #app, so those rules clipped every
       tab and killed scrolling. Re-open the page here: let the document flow
       and scroll normally, and un-fix #app so its content can grow tall. */
    html, body { height: auto; min-height: 100%; overflow-x: hidden; overflow-y: auto; }
    body { overflow: auto; }
    #app { position: static; inset: auto; overflow: visible; height: auto; min-height: 100%; }
    /* use the full screen width — cap only on ultra-wide displays so forms
       don't stretch absurdly, but otherwise fill the viewport edge to edge */
    .admin-wrap { max-width: 2400px; margin: 0 auto; padding: 20px 32px; }
    /* align-items:start so the two columns can each manage their own scroll */
    .admin-grid { display: grid; grid-template-columns: 200px 1fr; gap: 18px; align-items: start; }
    /* the nav sidebar sticks and scrolls on its own if it ever outgrows the viewport */
    .admin-nav { display: flex; flex-direction: column; gap: 6px; position: sticky; top: 20px; align-self: start; max-height: calc(100vh - 40px); overflow-y: auto; }
    .admin-nav .btn { text-align: left; }
    /* The content column is the scroll surface: min-width:0 lets it shrink inside the grid,
       and overflow-x:auto gives it a horizontal scrollbar whenever a child (a wide table,
       a big card grid) is wider than the column — so nothing is ever clipped, and this
       covers content built later by the async views too. Height is left to the page. */
    .admin-body { min-width: 0; overflow-x: auto; }
    /* a wide panel scrolls within itself so its own scrollbar stays tidy */
    .admin-body .panel { overflow-x: auto; }
    /* long editable lists (lore pools, sprite JSON) scroll instead of running off-screen */
    .admin-body textarea { max-height: 60vh; }
    table.adm { width: 100%; border-collapse: collapse; font-size: 13px; }
    /* nowrap keeps columns intact so a too-wide table overflows into the scroll surface
       above rather than squashing/wrapping into an unreadable mess */
    table.adm th, table.adm td { padding: 6px 8px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    table.adm th { color: var(--gold-dim); font-weight: normal; letter-spacing: .08em; font-size: 11px; text-transform: uppercase; }
    table.adm tr:hover td { background: #2a221633; }

    /* ============================================================
       MOBILE / NARROW SCREENS
       On a phone the 200px sidebar + content grid is unusable, so:
       - stack to a single column
       - turn the nav into a horizontal, swipeable tab bar pinned to the top
       - tighten padding and let tables scroll sideways as before
       - modals go (near) full-screen — the JS also switches their inset
       - inputs are 16px so iOS doesn't zoom the page when you focus a field
       ============================================================ */
    @media (max-width: 760px) {
      html { -webkit-text-size-adjust: 100%; }
      .admin-wrap { padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); }
      .admin-wrap > h1 { font-size: 20px; }
      .admin-grid { grid-template-columns: 1fr; gap: 12px; }
      /* nav becomes a sticky, horizontally scrolling row of tabs */
      .admin-nav {
        position: sticky; top: 0; z-index: 20;
        flex-direction: row; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden;
        max-height: none; gap: 6px; padding: 8px 2px;
        background: var(--bg, #14100a); border-bottom: 1px solid var(--line);
        -webkit-overflow-scrolling: touch;
      }
      .admin-nav .btn { flex: 0 0 auto; white-space: nowrap; text-align: center; }
      /* keep forms readable: single-column grids on tiny screens — both the
         in-page panels AND the editor modals (which attach to <body>, and use
         an inline 320px+1fr two-column layout that must stack on a phone) */
      .admin-body .grid, .panel .grid { grid-template-columns: 1fr !important; }
      /* 16px inputs prevent iOS focus-zoom */
      .admin-wrap input, .admin-wrap select, .admin-wrap textarea { font-size: 16px; }
      /* modals fill the screen and scroll internally */
      .modal, .panel[style*="position:fixed"], .panel[style*="position: fixed"] {
        inset: 0 !important; border-radius: 0 !important; max-height: 100vh;
      }
      table.adm { font-size: 12px; }
      table.adm th, table.adm td { padding: 6px 6px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="js/core/util.js"></script>
  <script src="js/core/audio.js"></script>
  <script src="js/config.js"></script>
  <script src="js/core/supabase.js"></script>
  <script src="js/data/species.js"></script>
  <script src="js/data/economy.js"></script>
  <script src="js/data/lore.js"></script>
  <script src="js/core/mods.js"></script>
  <script src="js/core/account_cloud.js"></script>
  <script src="js/core/token.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/market_online.js"></script>
  <script src="js/core/tournaments_online.js"></script>
  <script src="js/core/season.js"></script>
  <script src="js/engine/sprites.js"></script>
  <script src="js/engine/behaviors.js"></script>
  <script src="js/ui/admin.js"></script>
</body>
</html>
