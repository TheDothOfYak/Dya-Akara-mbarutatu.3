<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dya'Akara — Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%238a6f42'/><circle cx='50' cy='50' r='38' fill='%233a2f1d'/><circle cx='50' cy='50' r='14' fill='%23d4552a'/></svg>">
  <style>
    html, body { height: 100%; }
    body { overflow: auto; }
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    /* align-items:start so the two columns can each manage their own scroll */
    .admin-grid { display: grid; grid-template-columns: 200px 1fr; gap: 18px; align-items: start; }
    /* the nav sidebar sticks and scrolls on its own if it ever outgrows the viewport */
    .admin-nav { display: flex; flex-direction: column; gap: 6px; position: sticky; top: 20px; align-self: start; max-height: calc(100vh - 40px); overflow-y: auto; }
    .admin-nav .btn { text-align: left; }
    /* The content column is the scroll surface: min-width:0 lets it shrink inside the grid,
       and overflow-x:auto gives it a horizontal scrollbar whenever a child (a wide table,
       a big card grid) is wider than the column — so nothing is ever clipped, and this
       covers content built later by the async views too. Height is left to the page. */
    .admin-body { min-width: 0; overflow-x: auto; }
    /* a wide panel scrolls within itself so its own scrollbar stays tidy */
    .admin-body .panel { overflow-x: auto; }
    /* long editable lists (lore pools, sprite JSON) scroll instead of running off-screen */
    .admin-body textarea { max-height: 60vh; }
    table.adm { width: 100%; border-collapse: collapse; font-size: 13px; }
    /* nowrap keeps columns intact so a too-wide table overflows into the scroll surface
       above rather than squashing/wrapping into an unreadable mess */
    table.adm th, table.adm td { padding: 6px 8px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    table.adm th { color: var(--gold-dim); font-weight: normal; letter-spacing: .08em; font-size: 11px; text-transform: uppercase; }
    table.adm tr:hover td { background: #2a221633; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="js/core/util.js"></script>
  <script src="js/core/audio.js"></script>
  <script src="js/config.js"></script>
  <script src="js/core/supabase.js"></script>
  <script src="js/data/species.js"></script>
  <script src="js/data/economy.js"></script>
  <script src="js/data/lore.js"></script>
  <script src="js/core/mods.js"></script>
  <script src="js/core/account_cloud.js"></script>
  <script src="js/core/token.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/market_online.js"></script>
  <script src="js/core/tournaments_online.js"></script>
  <script src="js/core/season.js"></script>
  <script src="js/engine/sprites.js"></script>
  <script src="js/engine/behaviors.js"></script>
  <script src="js/ui/admin.js"></script>
</body>
</html>
